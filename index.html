<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Stableyard SDK API Documentation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sidebar-width: 280px;
        --header-height: 60px;
        --bg-primary: #ffffff;
        --bg-secondary: #f8fafc;
        --bg-tertiary: #f1f5f9;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-muted: #94a3b8;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --border-color: #e2e8f0;
        --success: #16a34a;
        --warning: #d97706;
        --error: #dc2626;
        --info: #0891b2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        overflow: hidden;
      }

      /* Header */
      header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--header-height);
        background: #1e293b;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        padding: 0 24px;
        z-index: 1000;
        gap: 24px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 700;
        font-size: 1.1rem;
        color: #f8fafc;
        text-decoration: none;
      }

      .logo-icon {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, var(--accent), #8b5cf6);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }

      .header-controls {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-left: auto;
      }

      .sdk-key-input {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.1);
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 0.85rem;
      }

      .sdk-key-input label {
        color: #94a3b8;
        font-weight: 500;
        white-space: nowrap;
      }

      .sdk-key-input input {
        background: transparent;
        border: none;
        color: #f8fafc;
        font-family: "SF Mono", Monaco, "Courier New", monospace;
        font-size: 0.85rem;
        width: 160px;
        outline: none;
      }

      .sdk-key-input input::placeholder {
        color: #64748b;
      }

      /* Layout */
      .layout {
        display: flex;
        height: 100vh;
        padding-top: var(--header-height);
      }

      /* Sidebar */
      .sidebar {
        width: var(--sidebar-width);
        background: var(--bg-secondary);
        border-right: 1px solid var(--border-color);
        overflow-y: auto;
        flex-shrink: 0;
      }

      .sidebar-header {
        padding: 20px;
        border-bottom: 1px solid var(--border-color);
      }

      .sidebar-title {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        margin-bottom: 12px;
        font-weight: 600;
      }

      .search-box {
        display: flex;
        align-items: center;
        background: var(--bg-tertiary);
        border-radius: 8px;
        padding: 8px 12px;
        gap: 8px;
      }

      .search-box svg {
        width: 16px;
        height: 16px;
        color: var(--text-muted);
        flex-shrink: 0;
      }

      .search-box input {
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-size: 0.875rem;
        width: 100%;
        outline: none;
      }

      .search-box input::placeholder {
        color: var(--text-muted);
      }

      .nav-group {
        padding: 16px 0;
      }

      .nav-group-title {
        padding: 8px 20px;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        font-weight: 600;
      }

      .nav-item {
        display: flex;
        align-items: center;
        padding: 10px 20px;
        gap: 10px;
        cursor: pointer;
        transition: background 0.15s ease;
        font-size: 0.875rem;
        color: var(--text-secondary);
      }

      .nav-item:hover {
        background: var(--bg-tertiary);
        color: var(--text-primary);
      }

      .nav-item.active {
        background: #dbeafe;
        color: #1d4ed8;
        border-right: 2px solid var(--accent);
      }

      .method-badge {
        font-size: 0.65rem;
        font-weight: 700;
        padding: 3px 6px;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        min-width: 42px;
        text-align: center;
      }

      .method-get {
        background: #dcfce7;
        color: #166534;
      }

      .method-post {
        background: #dbeafe;
        color: #1e40af;
      }

      .method-put {
        background: #fef3c7;
        color: #92400e;
      }

      .method-delete {
        background: #fee2e2;
        color: #991b1b;
      }

      .nav-item-path {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: "SF Mono", Monaco, "Courier New", monospace;
        font-size: 0.8rem;
      }

      /* Main Content */
      .main-content {
        flex: 1;
        overflow-y: auto;
        background: var(--bg-primary);
      }

      .welcome-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        padding: 40px;
        color: var(--text-secondary);
      }

      .welcome-icon {
        width: 80px;
        height: 80px;
        background: var(--bg-secondary);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        font-size: 36px;
      }

      .welcome-panel h2 {
        color: var(--text-primary);
        font-size: 1.5rem;
        margin: 0 0 12px;
      }

      .welcome-panel p {
        margin: 0;
        font-size: 1rem;
        max-width: 400px;
        line-height: 1.6;
      }

      /* Swagger UI Overrides */
      #swagger-ui {
        padding: 24px;
      }

      .swagger-ui,
      .swagger-ui .wrapper {
        padding: 0;
        max-width: 100%;
      }

      .swagger-ui .info {
        margin: 0 0 24px;
      }

      .swagger-ui .info .title {
        color: var(--text-primary);
        font-family: "Inter", sans-serif;
        font-size: 1.75rem;
      }

      .swagger-ui .info .description p {
        color: var(--text-secondary);
        font-family: "Inter", sans-serif;
      }

      .swagger-ui .scheme-container {
        background: var(--bg-secondary);
        box-shadow: none;
        padding: 16px 20px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
      }

      .swagger-ui .opblock-tag {
        color: var(--text-primary);
        font-family: "Inter", sans-serif;
        border-bottom: 1px solid var(--border-color);
      }

      .swagger-ui .opblock-tag:hover {
        background: var(--bg-secondary);
      }

      .swagger-ui .opblock {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        margin-bottom: 12px;
        box-shadow: none;
      }

      .swagger-ui .opblock .opblock-summary {
        border-bottom: 1px solid var(--border-color);
      }

      .swagger-ui .opblock .opblock-summary-method {
        font-family: "Inter", sans-serif;
        font-weight: 600;
        border-radius: 4px;
        min-width: 70px;
      }

      .swagger-ui .opblock .opblock-summary-path {
        font-family: "SF Mono", Monaco, "Courier New", monospace;
        color: var(--text-primary);
      }

      .swagger-ui .opblock .opblock-summary-description {
        font-family: "Inter", sans-serif;
        color: var(--text-secondary);
      }

      .swagger-ui .opblock.opblock-post {
        border-color: #93c5fd;
        background: #eff6ff;
      }

      .swagger-ui .opblock.opblock-post .opblock-summary-method {
        background: #2563eb;
      }

      .swagger-ui .opblock.opblock-get {
        border-color: #86efac;
        background: #f0fdf4;
      }

      .swagger-ui .opblock.opblock-get .opblock-summary-method {
        background: #16a34a;
      }

      .swagger-ui .opblock.opblock-put {
        border-color: #fcd34d;
        background: #fffbeb;
      }

      .swagger-ui .opblock.opblock-put .opblock-summary-method {
        background: #d97706;
      }

      .swagger-ui .opblock.opblock-delete {
        border-color: #fca5a5;
        background: #fef2f2;
      }

      .swagger-ui .opblock.opblock-delete .opblock-summary-method {
        background: #dc2626;
      }

      .swagger-ui .opblock-body {
        background: var(--bg-primary);
      }

      .swagger-ui .opblock-description-wrapper p,
      .swagger-ui .opblock-external-docs-wrapper p {
        color: var(--text-secondary);
        font-family: "Inter", sans-serif;
      }

      .swagger-ui table thead tr th,
      .swagger-ui table thead tr td {
        color: var(--text-primary);
        font-family: "Inter", sans-serif;
        border-bottom: 1px solid var(--border-color);
      }

      .swagger-ui .parameter__name,
      .swagger-ui .parameter__type {
        color: var(--text-secondary);
        font-family: "Inter", sans-serif;
      }

      .swagger-ui .parameter__name.required span {
        color: var(--error);
      }

      .swagger-ui .model-title {
        color: var(--text-primary);
        font-family: "Inter", sans-serif;
      }

      .swagger-ui .model {
        color: var(--text-secondary);
        font-family: "SF Mono", Monaco, "Courier New", monospace;
      }

      .swagger-ui .btn {
        font-family: "Inter", sans-serif;
        border-radius: 6px;
      }

      .swagger-ui .btn.execute {
        background: var(--accent);
        border-color: var(--accent);
      }

      .swagger-ui .btn.execute:hover {
        background: var(--accent-hover);
      }

      .swagger-ui .btn.cancel {
        font-family: "Inter", sans-serif;
      }

      .swagger-ui select {
        font-family: "Inter", sans-serif;
        background: #ffffff;
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        border-radius: 6px;
      }

      .swagger-ui input[type="text"],
      .swagger-ui textarea {
        font-family: "SF Mono", Monaco, "Courier New", monospace;
        background: #ffffff;
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        border-radius: 6px;
      }

      .swagger-ui .responses-inner h4,
      .swagger-ui .responses-inner h5 {
        color: var(--text-primary);
        font-family: "Inter", sans-serif;
      }

      .swagger-ui .response-col_status {
        color: var(--text-primary);
        font-family: "SF Mono", Monaco, "Courier New", monospace;
      }

      .swagger-ui .response-col_description {
        color: var(--text-secondary);
        font-family: "Inter", sans-serif;
      }

      .swagger-ui .highlight-code {
        background: #1e293b !important;
        border-radius: 8px;
      }

      .swagger-ui .highlight-code pre {
        color: #f8fafc;
      }

      .swagger-ui .copy-to-clipboard {
        background: #334155;
        border-radius: 4px;
      }

      .swagger-ui .microlight {
        background: #1e293b !important;
        color: #f8fafc;
        font-family: "SF Mono", Monaco, "Courier New", monospace;
        border-radius: 6px;
      }

      .swagger-ui section.models {
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-secondary);
      }

      .swagger-ui section.models h4 {
        color: var(--text-primary);
        font-family: "Inter", sans-serif;
        border-bottom: 1px solid var(--border-color);
      }

      .swagger-ui section.models .model-container {
        background: var(--bg-primary);
        border-radius: 6px;
        margin: 8px;
      }

      .swagger-ui .model-box {
        background: #f1f5f9;
        border-radius: 6px;
      }

      .swagger-ui .prop-type {
        color: var(--info);
      }

      .swagger-ui .prop-format {
        color: var(--text-muted);
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
      }

      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Loading state */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-muted);
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e2e8f0;
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 16px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Mobile responsiveness */
      @media (max-width: 1024px) {
        .sidebar {
          width: 240px;
        }
      }

      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          left: -280px;
          top: var(--header-height);
          height: calc(100vh - var(--header-height));
          z-index: 999;
          transition: left 0.3s ease;
        }

        .sidebar.open {
          left: 0;
        }

        .main-content {
          margin-left: 0;
        }

        .menu-toggle {
          display: flex;
        }

        .sdk-key-input input {
          width: 120px;
        }
      }

      .menu-toggle {
        display: none;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: #f8fafc;
      }

      .menu-toggle svg {
        width: 20px;
        height: 20px;
      }
    </style>
  </head>
  <body>
    <header>
      <button class="menu-toggle" onclick="toggleSidebar()">
        <svg
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          ></path>
        </svg>
      </button>
      <a href="#" class="logo">
        <div class="logo-icon">⛽</div>
        <span>Stableyard SDK API Documentation</span>
      </a>
      <div class="header-controls">
        <div class="sdk-key-input">
          <label>x-sdk-key:</label>
          <input
            id="sdk-key-input"
            type="text"
            placeholder="Enter SDK key"
            spellcheck="false"
          />
        </div>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">Endpoints</div>
          <div class="search-box">
            <svg
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              ></path>
            </svg>
            <input
              type="text"
              id="search-input"
              placeholder="Search endpoints..."
            />
          </div>
        </div>
        <nav id="nav-container">
          <div class="loading">
            <div class="loading-spinner"></div>
            Loading...
          </div>
        </nav>
      </aside>

      <main class="main-content">
        <div id="swagger-ui"></div>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"></script>
    <script>
      const STORAGE_KEY = "gasyard-sdk-auth";
      const sdkKeyInput = document.getElementById("sdk-key-input");
      const searchInput = document.getElementById("search-input");
      const navContainer = document.getElementById("nav-container");
      const sidebar = document.getElementById("sidebar");

      let endpoints = [];

      const loadAuth = () => {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) ?? "{}");
        } catch (err) {
          console.warn("Failed to parse saved auth", err);
          return {};
        }
      };

      const saveAuth = () => {
        const payload = {
          sdkKey: sdkKeyInput.value.trim(),
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      };

      const applyStoredValues = () => {
        const stored = loadAuth();
        if (stored.sdkKey) sdkKeyInput.value = stored.sdkKey;
      };

      applyStoredValues();

      sdkKeyInput.addEventListener("input", saveAuth);

      function toggleSidebar() {
        sidebar.classList.toggle("open");
      }

      function buildNavigation(spec) {
        endpoints = [];
        const groups = {};

        // Group endpoints by tag
        Object.entries(spec.paths).forEach(([path, methods]) => {
          Object.entries(methods).forEach(([method, details]) => {
            const tag = details.tags?.[0] || "Other";
            if (!groups[tag]) groups[tag] = [];
            groups[tag].push({
              method: method.toUpperCase(),
              path,
              summary: details.summary || path,
              operationId: details.operationId || `${method}-${path}`,
            });
            endpoints.push({
              method: method.toUpperCase(),
              path,
              summary: details.summary || path,
              tag,
            });
          });
        });

        let html = "";

        Object.entries(groups).forEach(([tag, items]) => {
          html += `<div class="nav-group" data-tag="${tag}">`;
          html += `<div class="nav-group-title">${tag}</div>`;
          items.forEach((item) => {
            const methodClass = `method-${item.method.toLowerCase()}`;
            html += `
              <div class="nav-item" data-path="${item.path}" data-method="${
              item.method
            }" onclick="scrollToEndpoint('${item.path}', '${item.method}')">
                <span class="method-badge ${methodClass}">${item.method}</span>
                <span class="nav-item-path">${item.path.replace(
                  "/sdk/v1",
                  ""
                )}</span>
              </div>
            `;
          });
          html += "</div>";
        });

        navContainer.innerHTML = html;
      }

      function scrollToEndpoint(path, method) {
        // Find and click the swagger operation
        const operations = document.querySelectorAll(".opblock");
        operations.forEach((op) => {
          const opPath = op.querySelector(".opblock-summary-path");
          const opMethod = op.querySelector(".opblock-summary-method");
          if (
            opPath &&
            opMethod &&
            opPath.textContent.trim().includes(path.replace("/sdk/v1", "")) &&
            opMethod.textContent.trim().toUpperCase() === method
          ) {
            // Expand the operation
            const summary = op.querySelector(".opblock-summary");
            if (summary && !op.classList.contains("is-open")) {
              summary.click();
            }
            // Scroll to it
            op.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        });

        // Update active state
        document.querySelectorAll(".nav-item").forEach((item) => {
          item.classList.remove("active");
        });
        const activeItem = document.querySelector(
          `.nav-item[data-path="${path}"][data-method="${method}"]`
        );
        if (activeItem) activeItem.classList.add("active");

        // Close sidebar on mobile
        if (window.innerWidth <= 768) {
          sidebar.classList.remove("open");
        }
      }

      // Search functionality
      searchInput.addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase();
        document.querySelectorAll(".nav-item").forEach((item) => {
          const path = item.dataset.path.toLowerCase();
          const method = item.dataset.method.toLowerCase();
          const matches =
            path.includes(query) ||
            method.includes(query) ||
            item.textContent.toLowerCase().includes(query);
          item.style.display = matches ? "flex" : "none";
        });

        // Show/hide group titles
        document.querySelectorAll(".nav-group").forEach((group) => {
          const hasVisibleItems = Array.from(
            group.querySelectorAll(".nav-item")
          ).some((item) => item.style.display !== "none");
          group.style.display = hasVisibleItems ? "block" : "none";
        });
      });

      // Initialize Swagger UI
      fetch("./openapi.json")
        .then((res) => res.json())
        .then((spec) => {
          buildNavigation(spec);

          SwaggerUIBundle({
            spec: spec,
            dom_id: "#swagger-ui",
            deepLinking: true,
            defaultModelsExpandDepth: 1,
            docExpansion: "list",
            filter: false,
            showExtensions: true,
            showCommonExtensions: true,
            requestInterceptor: (req) => {
              const { sdkKey } = loadAuth();
              if (sdkKey) {
                req.headers["x-sdk-key"] = sdkKey;
              }
              return req;
            },
          });
        })
        .catch((err) => {
          console.error("Failed to load OpenAPI spec:", err);
          navContainer.innerHTML = `<div class="loading" style="color: var(--error);">Failed to load API spec</div>`;
        });
    </script>
  </body>
</html>
